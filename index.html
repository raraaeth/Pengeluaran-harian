<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Keuangan</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    color:#333;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.filters{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:20px;
    flex-wrap:wrap;
}

select{
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h3{
    margin-bottom:10px;
}

.nominal{
    font-size:28px;
    font-weight:bold;
}

.masuk{
    color:#2e7d32;
}

.keluar{
    color:#c62828;
}

.saldo{
    color:#1565c0;
}

.section{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.section h2{
    margin-bottom:15px;
}

.ranking-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#222;
    color:white;
}

th,td{
    padding:10px;
    border:1px solid #ddd;
}

tr.masuk{
    background:#f1fff1;
}

tr.keluar{
    background:#fff5f5;
}

.table-wrapper{
    overflow-x:auto;
}

</style>

</head>

<body>

<div class="container">

<h1>💰 Dashboard Keuangan</h1>

<div class="filters">

<select id="bulanFilter"></select>

<select id="tahunFilter"></select>

</div>

<div class="cards">

<div class="card">
<h3>💵 Total Pemasukan</h3>
<div id="totalMasuk" class="nominal masuk">
Rp0
</div>
</div>

<div class="card">
<h3>💸 Total Pengeluaran</h3>
<div id="totalKeluar" class="nominal keluar">
Rp0
</div>
</div>

<div class="card">
<h3>💰 Sisa Saldo</h3>
<div id="saldo" class="nominal saldo">
Rp0
</div>
</div>

</div>

<div class="section">

<h2>📊 Breakdown Kategori</h2>

<div id="kategoriList">
Loading...
</div>

</div>

<div class="section">

<h2>📈 Statistik</h2>

<div id="statistik">
Loading...
</div>

</div>

<div class="section">

<h2>📋 Riwayat Transaksi</h2>

<div class="table-wrapper">

<table id="transaksiTable">

<thead>
<tr>
<th>Tanggal</th>
<th>Jenis</th>
<th>Kategori</th>
<th>Keterangan</th>
<th>Nominal</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<script>

const DATA_URL =
'https://opensheet.elk.sh/18SyIR5CwehYNStVL5DKpx18yhBj7On8slqsQ4-p_s-M/transaksi';

function rupiah(n){
    return 'Rp' + Number(n).toLocaleString('id-ID');
}

fetch(DATA_URL)
.then(res => res.json())
.then(data => {

    console.log(data);

    document.getElementById('kategoriList')
        .innerHTML =
        `Jumlah transaksi: ${data.length}`;

});

</script>

</body>
</html>
