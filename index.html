<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Keuangan</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    color:#333;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.filters{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-bottom:20px;
    flex-wrap:wrap;
}

select{
    padding:10px;
    border:1px solid #ddd;
    border-radius:8px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    margin-bottom:20px;
}
    .minggu-cards{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    }

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card h3{
    margin-bottom:10px;
}

.nominal{
    font-size:28px;
    font-weight:bold;
}

.masuk{
    color:#2e7d32;
}

.keluar{
    color:#c62828;
}

.saldo{
    color:#1565c0;
}

.section{
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.section h2{
    margin-bottom:15px;
}

.ranking-item{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #eee;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#222;
    color:white;
}

th,td{
    padding:10px;
    border:1px solid #ddd;
}

tr.masuk{
    background:#f1fff1;
}

tr.keluar{
    background:#fff5f5;
}

.table-wrapper{
    overflow-x:auto;
}

</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>💰 Dashboard Keuangan</h1>


 <div class="section">

<h2>📅 Minggu Ini</h2>

<div class="minggu-cards">

<div class="card">

<h3>💵 Pemasukan</h3>

<div id="mingguMasuk" class="nominal masuk">
Rp0
</div>

</div>

<div class="card">

<h3>💸 Pengeluaran</h3>

<div id="mingguKeluar" class="nominal keluar">
Rp0
</div>

</div>

</div>

    </div>

<div class="cards">

<div class="card">
<h3>💵 Total Pemasukan</h3>
<div id="totalMasuk" class="nominal masuk">
Rp0
</div>
</div>

<div class="card">
<h3>💸 Total Pengeluaran</h3>
<div id="totalKeluar" class="nominal keluar">
Rp0
</div>
</div>

<div class="card">
<h3>💰 Sisa Saldo</h3>
<div id="saldo" class="nominal saldo">
Rp0
</div>
</div>

</div>
<div class="filters">
<select id="bulanFilter"></select>

<select id="tahunFilter"></select>

<select id="kategoriFilter">
    <option value="">
        Semua Kategori
    </option>
</select>
</div>
<div class="section">

<h2>📊 Breakdown Kategori</h2>

<canvas id="kategoriChart"></canvas>

<br>

<div id="kategoriList">
Loading...
</div>

</div>

<div class="section">

<h2>📈 Statistik</h2>

<div id="statistik">
Loading...
</div>

</div>

<div class="section">

<h2>📋 Riwayat Transaksi</h2>

<div class="table-wrapper">

<table id="transaksiTable">

<thead>
<tr>
<th>Tanggal</th>
<th>Jenis</th>
<th>Kategori</th>
<th>Keterangan</th>
<th>Nominal</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

</div>

</div>

<script>

const DATA_URL =
'https://opensheet.elk.sh/18SyIR5CwehYNStVL5DKpx18yhBj7On8slqsQ4-p_s-M/transaksi';

function rupiah(n){
    return 'Rp' + Number(n).toLocaleString('id-ID');
}

let semuaData = [];
let kategoriChart = null;

const bulanNama = [
    'Januari',
    'Februari',
    'Maret',
    'April',
    'Mei',
    'Juni',
    'Juli',
    'Agustus',
    'September',
    'Oktober',
    'November',
    'Desember'
];

fetch(DATA_URL)
.then(res => res.json())
.then(data => {

    semuaData = data;

    isiFilter();

    render();

});

function isiFilter(){

    const bulanSelect =
        document.getElementById('bulanFilter');

    const tahunSelect =
        document.getElementById('tahunFilter');

    bulanNama.forEach((bulan,index)=>{

        bulanSelect.innerHTML += `
        <option value="${index+1}">
            ${bulan}
        </option>
        `;

    });

    const tahunSet =
        [...new Set(
            semuaData.map(item => {

                const t =
                    new Date(item.Tanggal);

                return t.getFullYear();

            })
        )];

    tahunSet.sort();

    tahunSet.forEach(tahun => {

        tahunSelect.innerHTML += `
        <option value="${tahun}">
            ${tahun}
        </option>
        `;

    });
    const kategoriSelect =
    document.getElementById(
        'kategoriFilter'
    );

const kategoriSet =
    [...new Set(
        semuaData.map(
            x => x.Kategori.trim()
        )
    )]
    .sort();

kategoriSet.forEach(k => {

    kategoriSelect.innerHTML += `
    <option value="${k}">
        ${k}
    </option>
    `;

});

    const sekarang = new Date();

    bulanSelect.value =
        sekarang.getMonth() + 1;

    tahunSelect.value =
        sekarang.getFullYear();

    bulanSelect.addEventListener(
        'change',
        render
    );

    tahunSelect.addEventListener(
        'change',
        render
    );
    kategoriSelect.addEventListener(
    'change',
    render
);

}

function render(){

 const hariIni = new Date();

const tujuhHariLalu = new Date();

tujuhHariLalu.setDate(
    hariIni.getDate() - 6
);

const dataMingguan =
    semuaData.filter(item => {

        const tanggal =
            new Date(item.Tanggal);

        return (
            tanggal >= tujuhHariLalu &&
            tanggal <= hariIni
        );

    });
    const bulan =
        Number(
            document.getElementById(
                'bulanFilter'
            ).value
        );

    const tahun =
        Number(
            document.getElementById(
                'tahunFilter'
            ).value
        );

    const kategoriDipilih =
    document.getElementById(
        'kategoriFilter'
    ).value;

const data =
    semuaData.filter(item => {

        const t =
            new Date(item.Tanggal);

        const cocokBulan =
            t.getMonth()+1 === bulan;

        const cocokTahun =
            t.getFullYear() === tahun;

        const cocokKategori =
            !kategoriDipilih ||
            item.Kategori.trim() ===
            kategoriDipilih;

        return (
            cocokBulan &&
            cocokTahun &&
            cocokKategori
        );
        
    });

   let mingguMasuk = 0;
let mingguKeluar = 0;

dataMingguan.forEach(item => {

    const nominal =
        Number(item.Nominal);

    if(item.Jenis === 'Masuk'){

        mingguMasuk += nominal;

    }else{

        mingguKeluar += nominal;

    }

});
    let totalMasuk = 0;
    let totalKeluar = 0;

    const kategori = {};

    data.forEach(item => {

        const nominal =
            Number(item.Nominal);

        if(item.Jenis === 'Masuk'){

            totalMasuk += nominal;

        }else{

            totalKeluar += nominal;

            kategori[item.Kategori] =
                (kategori[item.Kategori] || 0)
                + nominal;

        }

    });

document.getElementById(
    'mingguMasuk'
).innerText =
rupiah(mingguMasuk);

document.getElementById(
    'mingguKeluar'
).innerText =
rupiah(mingguKeluar);
    
    document.getElementById(
        'totalMasuk'
    ).innerText =
    rupiah(totalMasuk);

    document.getElementById(
        'totalKeluar'
    ).innerText =
    rupiah(totalKeluar);

    document.getElementById(
        'saldo'
    ).innerText =
    rupiah(totalMasuk - totalKeluar);

    const kategoriUrut =
        Object.entries(kategori)
        .sort((a,b)=>b[1]-a[1]);

    let kategoriHTML = '';

    kategoriUrut.forEach(
        ([nama,jumlah]) => {

        kategoriHTML += `
        <div class="ranking-item">
            <span>${nama}</span>
            <strong>
                ${rupiah(jumlah)}
            </strong>
        </div>
        `;

    });

    document.getElementById(
        'kategoriList'
    ).innerHTML =
    kategoriHTML || 'Tidak ada data';

    const top9 =
    kategoriUrut.slice(0,9);

const lainnya =
    kategoriUrut
    .slice(9)
    .reduce(
        (sum,item)=>sum+item[1],
        0
    );

const chartData = [...top9];

if(lainnya > 0){

    chartData.push([
        'Lainnya',
        lainnya
    ]);

}

const labels =
    chartData.map(x=>x[0]);

const values =
    chartData.map(x=>x[1]);

const ctx =
    document.getElementById(
        'kategoriChart'
    );

if(kategoriChart){

    kategoriChart.destroy();

}

kategoriChart =
new Chart(ctx, {

    type:'pie',

    data:{
        labels:labels,
        datasets:[{
            data:values
        }]
    },

    options:{
        responsive:true,
        plugins:{
            legend:{
                position:'bottom'
            }
        }
    }

});

    const terbesar =
        kategoriUrut[0];

    const hariUnik =
        [...new Set(
            data
            .filter(
                x => x.Jenis === 'Keluar'
            )
            .map(x => x.Tanggal)
        )];

    const rataRata =
        hariUnik.length
        ? totalKeluar /
          hariUnik.length
        : 0;

    document.getElementById(
        'statistik'
    ).innerHTML = `
    <div class="ranking-item">
        <span>
            Pengeluaran Terbesar
        </span>
        <strong>
            ${
                terbesar
                ? terbesar[0]
                  + ' - '
                  + rupiah(
                        terbesar[1]
                    )
                : '-'
            }
        </strong>
    </div>

    <div class="ranking-item">
        <span>
            Pengeluaran Harian Rata-rata
        </span>
        <strong>
            ${rupiah(rataRata)}
        </strong>
    </div>
    `;

    const tbody =
        document.querySelector(
            '#transaksiTable tbody'
        );

    tbody.innerHTML = '';

    data
    .sort(
        (a,b)=>
        new Date(b.Tanggal)
        -
        new Date(a.Tanggal)
    )
    .forEach(item => {

        tbody.innerHTML += `
        <tr class="${
            item.Jenis === 'Masuk'
            ? 'masuk'
            : 'keluar'
        }">

            <td>${item.Tanggal}</td>

            <td>${item.Jenis}</td>

            <td>${item.Kategori}</td>

            <td>${item.Keterangan}</td>

            <td>
                ${rupiah(item.Nominal)}
            </td>

        </tr>
        `;

    });

}

</script>
</body>
</html>
